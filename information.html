<!DOCTYPE html>
<html>

<head>
    <style>
        html {
            height: 100%;
        }

        /* body */
        body {
            margin: 0px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* header */
        header {
            /*background-color: #c8ddc8;*/
            width: 100%;
            color: black;
            display: flex;
            align-items: center;
            border-bottom: 4px solid rgb(32, 17, 95);
        }

        .title {
            margin-left: 20px;
        }

        .headers {
            width: 100px;
            display: flex;
            justify-content: center;
            border: 0.3px solid #d3d3d3;
            cursor: pointer;
            transition: 0.2s;
        }

        .headers:hover {
            background-color: #d3d3d3;
        }

        #headerMostLeft {
            margin-left: auto;
        }

        #headerMostRight {
            margin-right: 80px;
        }

        div.headers:not(#headerMostLeft) {
            margin-left: 40px;
        }

        /* main */
        #heading {
            font-size: 60px;
            padding-left: 10px;
            border-left: 10px solid #7627f7dc;
            margin: 10px 0px 0px 20px;
        }

        #bigmain {
            width: 90%;
            flex: 1;
            background-image: url(backgroundimg.png);
            background-size: 100% 100%;
            background-position: center;
            overflow: hidden;
            background-repeat: no-repeat;
        }

        /* footer */
        footer {
            width: 100%;
            height: 30px;
            background-color: rgb(32, 17, 95);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <title>情報</title>
</head>

<body>
    <header>
        <h1 class="title">学校の自主学習</h1>
        <div id="headerMostLeft" class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/'">
            <h2><a>ホーム</a></h2>
        </div>
        <div class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/explanation.html'">
            <h2><a>説明</a></h2>
        </div>
        <div class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/information.html'">
            <h2><a>情報</a></h2>
        </div>
        <div id="headerMostRight" class="headers"
            onclick="location.href = 'https://asakei968.github.io/Homework/other.html'">
            <h2><a>その他</a></h2>
        </div>
    </header>

    <div id="bigmain">
        <h1 class="title" id="heading">情報</h1>
    </div>

    <footer>
        © asakei968. All Rights Reserved.
    </footer>
</body>

</html>
