<!DOCTYPE html>

<head>
    <style>
        /* header */
        header {
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid gray;
        }

        #title {
            margin-left: 20px;
        }

        .headers {
            width: 100px;
            display: flex;
            justify-content: center;
            border: 0.3px solid #d3d3d3;
            cursor: pointer;
        }

        #headerMostLeft {
            margin-left: auto;
        }

        #headerMostRight {
            margin-right: 80px;
        }

        div.headers:not(#headerMostLeft) {
            margin-left: 40px;
        }

        /*main*/
        main {
            display: flex;
            justify-content: center;
        }

        ul {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        li {
            list-style: none;
        }

        li:not(#listsLabel) {
            font-size: 50px;
        }

        #listsLabel {
            margin: 0px;
            margin-bottom: 20px;
        }
    </style>
    <title>自主学習</title>
</head>

<body>
    <header>
        <h1 id="title">学校の自主学習</h1>
        <div id="headerMostLeft" class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/'">
            <h2><a>ホーム</a></h2>
        </div>
        <div class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/explanation.html'">
            <h2><a>説明</a></h2>
        </div>
        <div class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/information.html'">
            <h2><a>情報</a></h2>
        </div>
        <div id="headerMostRight" class="headers"
            onclick="location.href = 'https://asakei968.github.io/Homework/other.html'">
            <h2><a>その他</a></h2>
        </div>
    </header>

    <main>
        <ul>
            <li id="listsLabel">
                <h1 style="margin:0px;">自主勉サイト一覧</h1>
            </li>
            <li><a href="https://asakei968.github.io/Homework/hyakumasu.html" target="_blank">百ます計算（かけ算）</a></li>
            <li><a href="https://asakei968.github.io/Homework/graph.html" target="_blank">グラフ生成</a></li>
        </ul>
    </main>
</body>
