<!DOCTYPE html>
<html>

<head>
    <title>百ます計算</title>
    <style>
        /* header */
        header {
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid gray;
        }

        #title {
            margin-left: 20px;
        }

        .headers {
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
        }

        #headerMostLeft {
            margin-left: auto;
        }

        #headerMostRight {
            margin-right: 80px;
        }

        div.headers:not(#headerMostLeft) {
            margin-left: 40px;
        }

        main {
            display: flex;
        }

        td {
            border: 1px solid black;
            width: 50px;
            height: 50px;
            text-align: center;
        }

        h2 {
            margin: 1px 3px;
        }

        p {
            margin: 1px 3px;
        }

        #setsumei {
            margin: 20px 0px 10px 20px;
            margin-bottom: 10px;
        }

        #setsumei h2 {
            font-size: 40px;
        }

        #setsumei p {
            font-size: 20px;
        }

        input {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 30px;
        }

        #time {
            width: 500px;
            padding: 250px 0px 250px 200px;
            font-size: 75px;
        }

        #right {
            display: flex;
            flex-direction: column;
        }

        button,
        select {
            margin-right: 50px;
            font-size: 30px;
        }
    </style>
</head>

<body onload="make()">
    <header>
        <h1 id="title">百ます計算</h1>
        <div id="headerMostLeft" class="headers" style="width: 400px;">
            <select id="type">
                <option value="int">整数(1桁) × 整数(1桁)</option>
                <option value="float">小数(0.5区切り) × 整数(1桁)</option>
            </select>
        </div>
        <div id="headerMostRight" class="headers">
            <button id="make" style="width: 100px;">作成</button>
        </div>
    </header>

    <main>
        <div id="left">
            <!--説明-->
            <div id="setsumei">
                <h2>説明</h2>
                <p>これは百ます計算（かけ算）です。</p>
                <p>整数(1桁) × 整数(1桁)というところを押すと百ます計算のモードを選べます。</p>
                <p>"スタート"ボタンを押すとタイマーが始まります。</p>
                <p>"答え合わせ"ボタンを押すと答えが表示され、タイマーがストップします。</p>
                <p style="border-bottom: solid 2px red;width:fit-content;">答えを表示したときの<span
                        style="color:blue;">青い文字</span>は正解、<span style="color:red;">赤い文字</span>は不正解です。</p>
                <p>作成ボタンを押すと、新しい問題が出ます。</p>
            </div>
            <h1 id="time"></h1>
        </div>

        <div id="right">
            <div>
                <button id="start">スタート</button>
                <button id="kotae">答え合わせ</button>
            </div>
            <!--百ます計算の表-->
            <table id="hyakumasu"></table>
        </div>
    </main>

    <!--script-->
    <script>
        // table
        const table = document.getElementById("hyakumasu");

        let nowFocus = "11";

        let time = 0;
        let sec = 0;
        let min = 0;
        let hour = 0;
        let timer;
        let timerAlready = false;
        const timeElement = document.getElementById("time");

        // 要素の追加
        for (let y = 0; y < 11; y++) {
            const tr = document.createElement("tr");
            table.appendChild(tr);

            for (let x = 0; x < 11; x++) {
                const td = document.createElement("td");
                td.id = `${reverse(x)}${reverse(y)}`;
                tr.appendChild(td);
            }
        }

        document.getElementById("00").textContent = "×"

        function make() {
            for (let y = 1; y < 11; y++) {
                for (let x = 1; x < 11; x++) {
                    document.getElementById(`${reverse(x)}${reverse(y)}`).textContent = "";
                    const input = document.createElement("input");
                    input.type = "text";
                    input.onclick = function () { nowFocus = this.parentElement.id; }
                    document.getElementById(`${reverse(x)}${reverse(y)}`).appendChild(input);
                }
            }

            time = 0;
            timerAlready = false;
            document.getElementById("time").textContent = "";

            // 左と上の数字
            let topRandomNums = [];
            for (let i = 1; i < 11; i++) {
                let random;

                while (true) {
                    random = originalNum("top");
                    if (!topRandomNums.includes(random)) {
                        topRandomNums.push(random);
                        break;
                    }
                }
                document.getElementById(`${reverse(i)}0`).textContent = random;
            }

            let leftRandomNums = [];
            for (let i = 1; i < 11; i++) {
                let random;

                while (true) {
                    random = originalNum("left");
                    if (!leftRandomNums.includes(random)) {
                        leftRandomNums.push(random);
                        break;
                    }
                }
                document.getElementById(`0${reverse(i)}`).textContent = random;
            }

            function originalNum(topOrLeft) {
                if (document.getElementById("type").value == "float" && topOrLeft == "top")
                    return Math.floor(Math.random() * 10) / 2;
                else
                    return Math.floor(Math.random() * 10);
            }
        }

        document.getElementById("make").addEventListener("click", make);

        // 答えの表示
        function showKotae() {
            for (let y = 1; y < 11; y++) {
                for (let x = 1; x < 11; x++) {
                    const target = document.getElementById(`${reverse(x)}${reverse(y)}`);

                    const top = Number(document.getElementById(`${reverse(x)}0`).textContent);
                    const left = Number(document.getElementById(`0${reverse(y)}`).textContent);

                    if (target.firstElementChild.value != "" && Number(target.firstElementChild.value) == top * left) {
                        target.style = "color:blue;font-size: 30px;";
                    } else {
                        target.style = "color:red;font-size: 30px;";
                    }

                    target.textContent = top * left;
                }
            }

            // タイマー停止
            clearInterval(timer);
        }

        document.getElementById("kotae").addEventListener("click", showKotae);

        // タイマー
        function updateTime() {
            time += 0.1;
            sec = time % 60;
            min = Math.floor(time % 3600 / 60);
            if (min >= 60)
                min = 0;
            hour = Math.floor(time % 86400 / 3600);
            timeElement.textContent = `${hour}：${min}：${sec.toFixed(1)}`;
        }

        document.getElementById("start").addEventListener("click", function () {
            if (!timerAlready) {
                timer = setInterval(updateTime, 100);
                timerAlready = true;
            }
        })

        function keyDown(event) {
            switch (event.key) {
                case 'ArrowUp':
                    if (nowFocus[1] != 1)
                        nowFocus = `${nowFocus[0]}${reverse(conversion(nowFocus[1]) - 1)}`;
                    document.getElementById(nowFocus).firstElementChild.focus();
                    break;
                case 'ArrowDown':
                    nowFocus = `${nowFocus[0]}${reverse(conversion(nowFocus[1]) + 1)}`;
                    document.getElementById(nowFocus).firstElementChild.focus();
                    break;
                case 'ArrowLeft':
                    if (nowFocus[0] != 1)
                        nowFocus = `${reverse(conversion(nowFocus[0]) - 1)}${nowFocus[1]}`;
                    document.getElementById(nowFocus).firstElementChild.focus();
                    break;
                case 'ArrowRight':
                    nowFocus = `${reverse(conversion(nowFocus[0]) + 1)}${nowFocus[1]}`;
                    document.getElementById(nowFocus).firstElementChild.focus();
                    break;
            }
        }
        window.addEventListener('keydown', keyDown);

        function conversion(num) {
            let result = Number(num);
            if (isNaN(result)) {
                result = 10;
            }
            return result;
        }

        function reverse(num) {
            if (num >= 10) {
                return "A";
            }
            return num;
        }
    </script>
</body>

</html>
