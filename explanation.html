<!DOCTYPE html>
<html>

<head>
    <style>
        /* header */
        header {
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid gray;
        }

        #title {
            margin-left: 20px;
        }

        .headers {
            width: 100px;
            display: flex;
            justify-content: center;
            border: 0.3px solid #d3d3d3;
            cursor: pointer;
        }

        #headerMostLeft {
            margin-left: auto;
        }

        #headerMostRight {
            margin-right: 80px;
        }

        div.headers:not(#headerMostLeft) {
            margin-left: 40px;
        }

        /* main */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            margin: 20px 0px 0px 0px;
        }

        .explanation {
            width: 500px;
        }
    </style>
    <title>自主学習</title>
</head>

<body>
    <header>
        <h1 id="title">学校の自主学習</h1>
        <div id="headerMostLeft" class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/'">
            <h2><a>ホーム</a></h2>
        </div>
        <div class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/explanation.html'">
            <h2><a>説明</a></h2>
        </div>
        <div class="headers" onclick="location.href = 'https://asakei968.github.io/Homework/information.html'">
            <h2><a>情報</a></h2>
        </div>
        <div id="headerMostRight" class="headers"
            onclick="location.href = 'https://asakei968.github.io/Homework/other.html'">
            <h2><a>その他</a></h2>
        </div>
    </header>

    <main>
        <h2 class="title">このサイトの説明<br></h2>
        <p class="explanation">
            自主学習のために作ったサイトをまとめました。<br>
            ホームと書かれているところでサイトのリンク集のページに行けます。<br>
        </p>
        <h2 class="title">百ます計算の説明</h2>
        <p class="explanation">
            百ます計算を作りました。<br>
            詳しくはサイトを見ればわかります。<br>
            ルールは「百ます計算 ルール」のように検索すれば出てきます。
        </p>
        <h2 class="title">
            グラフ生成の説明
        </h2>
        <p class="explanation">
            グラフ生成サイトを作りました。<br>
            詳しくはサイトを見ればわかります。
        </p>
    </main>
</body>

</html>
